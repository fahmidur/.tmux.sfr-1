# start with mouse mode enabled
set -g mouse on

# force Vi mode
#   really you should export VISUAL or EDITOR environment variable, see manual
set -g status-keys vi
set -g mode-keys vi

# Fixes the the issue of new windows opening
# where there are gap in numbering when old windows are closed.
set -g renumber-windows on

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

bind -r S-Left  swap-window -t -1 \; select-window -t -1
bind -r S-Right swap-window -t +1 \; select-window -t +1

#-----------------------------------------------

bind Enter copy-mode # enter copy mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

bind -T prefix s choose-tree -Z

#-----------------------------------------------
bind \% split-window -h -c "#{pane_current_path}"
bind \" split-window -c "#{pane_current_path}"
#-----------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-yank'

set-option -g mouse on

# set -g @plugin 'wfxr/tmux-power'
# set -g @tmux_power_theme 'coral'

# set -g @plugin "janoamaral/tokyo-night-tmux"

set -g status-style bg=default

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


set-window-option -g window-status-current-style fg=black,bg=blue

